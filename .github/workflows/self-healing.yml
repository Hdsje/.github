name: Self Healing

on:
  workflow_call:
    secrets:
      TELEGRAM_BOT_TOKEN:
        required: false
      TELEGRAM_CHAT_ID:
        required: false

permissions:
  contents: read
  issues: write

jobs:
  health:
    runs-on: self-hosted
    timeout-minutes: 10
    steps:
      - name: 🏥 Health Check
        id: check
        run: |
          ALL_OK=true
          ISSUES=""

          # Docker containers
          UNHEALTHY=$(docker ps --filter "health=unhealthy" --format '{{.Names}}' 2>/dev/null || echo "")
          if [ -n "$UNHEALTHY" ]; then
            ISSUES="${ISSUES}🐳 Docker: ${UNHEALTHY}\n"
            ALL_OK=false
            for c in $UNHEALTHY; do docker restart "$c" 2>/dev/null || true; done
          fi

          # Disk space
          DISK=$(df / --output=pcent | tail -1 | tr -d ' %')
          if [ "$DISK" -gt 90 ]; then
            ISSUES="${ISSUES}💾 Диск: ${DISK}%\n"
            ALL_OK=false
            docker system prune -f 2>/dev/null || true
          fi

          # Memory
          MEM=$(free -m | awk '/^Mem:/ {print $7}')
          if [ "$MEM" -lt 256 ]; then
            ISSUES="${ISSUES}🧠 RAM: ${MEM}MB свободно\n"
            ALL_OK=false
          fi

          echo "all_ok=$ALL_OK" >> $GITHUB_OUTPUT

          # Безопасный multiline output
          DELIMITER=$(openssl rand -hex 16)
          echo "issues<<${DELIMITER}" >> $GITHUB_OUTPUT
          echo -e "$ISSUES" >> $GITHUB_OUTPUT
          echo "${DELIMITER}" >> $GITHUB_OUTPUT

      - name: 📢 Telegram
        if: steps.check.outputs.all_ok == 'false'
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          REPO: ${{ github.event.repository.name }}
          ISSUES: ${{ steps.check.outputs.issues }}
        run: |
          [ -z "$TELEGRAM_BOT_TOKEN" ] && exit 0
          MSG=$(printf "🏥 Self-Healing\n📦 %s\n%s" "$REPO" "$ISSUES")
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d chat_id="$TELEGRAM_CHAT_ID" \
            --data-urlencode "text=$MSG" > /dev/null
