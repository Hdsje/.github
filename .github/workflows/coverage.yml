name: Coverage Report

on:
  workflow_call:

permissions:
  contents: read
  pull-requests: write

jobs:
  coverage:
    runs-on: self-hosted
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Установка
        run: npm ci

      - name: 🧪 Тесты с coverage
        run: npx jest --coverage --coverageReporters='text-summary'
