name: License Audit

on:
  workflow_call:

jobs:
  license-check:
    runs-on: self-hosted
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Установка
        run: npm ci

      - name: 📜 Проверка лицензий
        run: |
          echo "=== Сводка ==="
          npx license-checker --summary
          echo ""
          echo "=== Проверка запрещённых ==="
          npx license-checker --onlyAllow 'MIT;ISC;Apache-2.0;BSD-2-Clause;BSD-3-Clause;0BSD;CC0-1.0;Unlicense;CC-BY-4.0;CC-BY-3.0;Python-2.0;BlueOak-1.0.0'
