name: Security Scan

on:
  workflow_call:
    inputs:
      target_url:
        description: 'URL для сканирования'
        required: false
        type: string
        default: 'http://localhost:3000'

permissions:
  contents: read
  issues: write

jobs:
  scan:
    runs-on: self-hosted
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: 🔐 Security Headers Check
        env:
          TARGET: ${{ inputs.target_url }}
        run: |
          echo "=== Security Headers: $TARGET ==="

          HEADERS=$(curl -sI "$TARGET" 2>/dev/null || echo "")
          if [ -z "$HEADERS" ]; then
            echo "⚠️ Не удалось подключиться к $TARGET"
            exit 0
          fi

          ISSUES=""
          FOUND=0

          check_header() {
            if echo "$HEADERS" | grep -qi "$1"; then
              echo "✅ $1"
            else
              echo "❌ $1 отсутствует"
              ISSUES="${ISSUES}❌ $1\n"
              FOUND=$((FOUND + 1))
            fi
          }

          check_header "x-frame-options"
          check_header "x-content-type-options"
          check_header "strict-transport-security"
          check_header "content-security-policy"
          check_header "x-xss-protection"
          check_header "referrer-policy"

          echo ""
          if [ $FOUND -gt 0 ]; then
            echo "⚠️ Найдено $FOUND проблем с заголовками безопасности"
          else
            echo "✅ Все заголовки безопасности на месте"
          fi
