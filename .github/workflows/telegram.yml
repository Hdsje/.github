name: Telegram Notification

on:
  workflow_call:
    inputs:
      event_type:
        description: '–Ґ–Є–њ —Б–Њ–±—Л—В–Є—П: ci_failed, pr_opened, pr_merged, release'
        required: true
        type: string
      repo_name:
        description: '–Ш–Љ—П —А–µ–њ–Њ–Ј–Є—В–Њ—А–Є—П'
        required: true
        type: string
      details:
        description: '–Ф–µ—В–∞–ї–Є (workflow, PR title, tag)'
        required: false
        type: string
        default: ''
      url:
        description: '–°—Б—Л–ї–Ї–∞ –љ–∞ –ї–Њ–≥–Є/PR/release'
        required: false
        type: string
        default: ''
      author:
        description: '–Р–≤—В–Њ—А'
        required: false
        type: string
        default: ''
    secrets:
      TELEGRAM_BOT_TOKEN:
        required: true
      TELEGRAM_CHAT_ID:
        required: true

jobs:
  send:
    runs-on: self-hosted
    timeout-minutes: 5
    steps:
      - name: рЯУҐ –Ю—В–њ—А–∞–≤–Ї–∞
        env:
          EVENT: ${{ inputs.event_type }}
          REPO: ${{ inputs.repo_name }}
          DETAILS: ${{ inputs.details }}
          URL: ${{ inputs.url }}
          AUTHOR: ${{ inputs.author }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          case "$EVENT" in
            ci_failed)
              MESSAGE=$(printf "рЯФі *CI Failed*\n\nрЯУ¶ *%s*\nвЭМ %s\nрЯС§ @%s\n\n[–Я–Њ—Б–Љ–Њ—В—А–µ—В—М –ї–Њ–≥–Є](%s)" \
                "$REPO" "$DETAILS" "$AUTHOR" "$URL")
              ;;
            pr_opened)
              MESSAGE=$(printf "рЯЯ° *–Э–Њ–≤—Л–є PR*\n\nрЯУ¶ *%s*\nрЯУЭ %s\nрЯС§ @%s\n\n[–Я–Њ—Б–Љ–Њ—В—А–µ—В—М PR](%s)" \
                "$REPO" "$DETAILS" "$AUTHOR" "$URL")
              ;;
            pr_merged)
              MESSAGE=$(printf "рЯЯҐ *PR —Б–Љ–µ—А–ґ–µ–љ*\n\nрЯУ¶ *%s*\nрЯУЭ %s\n\n[–Я–Њ–і—А–Њ–±–љ–µ–µ](%s)" \
                "$REPO" "$DETAILS" "$URL")
              ;;
            release)
              MESSAGE=$(printf "рЯЪА *–†–µ–ї–Є–Ј %s*\n\nрЯУ¶ *%s*\n\n[Release Notes](%s)" \
                "$DETAILS" "$REPO" "$URL")
              ;;
            self_heal)
              MESSAGE=$(printf "рЯІ† *AI Self-Heal*\n\nрЯУ¶ *%s*\nрЯФІ %s" \
                "$REPO" "$DETAILS")
              ;;
            health_alert)
              MESSAGE=$(printf "рЯП• *Self-Healing Alert*\n\nрЯУ¶ *%s*\n%s" \
                "$REPO" "$DETAILS")
              ;;
            *)
              MESSAGE=$(printf "рЯУ¶ *%s*\n%s" "$REPO" "$DETAILS")
              ;;
          esac

          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d chat_id="$TELEGRAM_CHAT_ID" \
            -d parse_mode="Markdown" \
            -d disable_web_page_preview="true" \
            --data-urlencode "text=$MESSAGE" > /dev/null
