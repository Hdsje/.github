name: Telegram Notification

on:
  workflow_call:
    inputs:
      event_type:
        description: 'Тип события: ci_failed, pr_opened, pr_merged, release'
        required: true
        type: string
      repo_name:
        description: 'Имя репозитория'
        required: true
        type: string
      details:
        description: 'Детали (workflow, PR title, tag)'
        required: false
        type: string
        default: ''
      url:
        description: 'Ссылка на логи/PR/release'
        required: false
        type: string
        default: ''
      author:
        description: 'Автор'
        required: false
        type: string
        default: ''
    secrets:
      TELEGRAM_BOT_TOKEN:
        required: true
      TELEGRAM_CHAT_ID:
        required: true

jobs:
  send:
    runs-on: self-hosted
    steps:
      - name: 📢 Отправка
        run: |
          EVENT="${{ inputs.event_type }}"
          REPO="${{ inputs.repo_name }}"
          DETAILS="${{ inputs.details }}"
          URL="${{ inputs.url }}"
          AUTHOR="${{ inputs.author }}"

          case "$EVENT" in
            ci_failed)
              MESSAGE=$(printf "🔴 *CI Failed*\n\n📦 *%s*\n❌ %s\n👤 @%s\n\n[Посмотреть логи](%s)" \
                "$REPO" "$DETAILS" "$AUTHOR" "$URL")
              ;;
            pr_opened)
              MESSAGE=$(printf "🟡 *Новый PR*\n\n📦 *%s*\n📝 %s\n👤 @%s\n\n[Посмотреть PR](%s)" \
                "$REPO" "$DETAILS" "$AUTHOR" "$URL")
              ;;
            pr_merged)
              MESSAGE=$(printf "🟢 *PR смержен*\n\n📦 *%s*\n📝 %s\n\n[Подробнее](%s)" \
                "$REPO" "$DETAILS" "$URL")
              ;;
            release)
              MESSAGE=$(printf "🚀 *Релиз %s*\n\n📦 *%s*\n\n[Release Notes](%s)" \
                "$DETAILS" "$REPO" "$URL")
              ;;
            self_heal)
              MESSAGE=$(printf "🧠 *AI Self-Heal*\n\n📦 *%s*\n🔧 %s" \
                "$REPO" "$DETAILS")
              ;;
            health_alert)
              MESSAGE=$(printf "🏥 *Self-Healing Alert*\n\n📦 *%s*\n%s" \
                "$REPO" "$DETAILS")
              ;;
            *)
              MESSAGE=$(printf "📦 *%s*\n%s" "$REPO" "$DETAILS")
              ;;
          esac

          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d parse_mode="Markdown" \
            -d disable_web_page_preview="true" \
            --data-urlencode "text=$MESSAGE" > /dev/null
